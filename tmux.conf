bind-key r source-file ~/.config/tmux/tmux.conf

set-option -g prefix F12

# stop renaming my stuff
set-option -g allow-rename off

# bell stuff
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
setw -g bell-action none

# splits 
bind-key v split-window
bind-key h split-window -h
unbind '"'
unbind %

# panes
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# colors
set-option -g pane-border-style 'bg=default fg=red'
set-option -g pane-border-style bg=default
set-option -g status-style bg=default
set-option -g message-style "fg=default bg=yellow bold"
set-option -g display-panes-active-colour colour3
set-option -g display-panes-colour colour166
set-option -g clock-mode-colour colour166

set -g status-interval 1
set -g status-justify centre
set -g status-left-length 10
set -g status-right-length 140
set -g status-left ""
set -g status-right ""
set-option -g status-position top

setw -g window-status-format " [#I] #[fg=white]#W#F "
setw -g window-status-current-format " #W "
setw -g window-status-current-style "fg=black bg=purple"
setw -g window-status-style "fg=purple bg=default"
setw -g window-status-bell-style "fg=yellow bg=red bold"

set -s escape-time 0 # faster key repetition

setw -g aggressive-resize on

# twm
bind f run-shell "tmux neww twm"
# bind F run-shell "tmux neww twm -l"
bind s run-shell "tmux neww twm -e"
bind g run-shell "tmux neww twm -g"
# bind e run-shell "tmux switch -t $TWM_DEFAULT"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# file picker
set -g @plugin 'tmux-plugins/tmux-fpp'
set -g @fpp-bind off # disables `prefix + f`
set -g @fpp-path '~/.config/tmux/plugins/tmux-fpp/fpp.tmux'
bind Space run-shell '~/.config/tmux/plugins/tmux-fpp/fpp.tmux start edit'

# floating terminal
set -g @plugin "lloydbond/tmux-floating-terminal"
set -g @floating_scratch_term 'i'
# TODO:
# set -g @floating_scratch_to_active_win 'M-h'
# set -g @floating_scratch_to_win 'M-l'
# set -g @floating_active_pane_to_scratch 'M-m'

# copying and pasting
set -g @plugin 'Morantron/tmux-fingers'

# saving sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
